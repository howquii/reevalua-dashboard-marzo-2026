<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reevalúa × TikTok Ads — MCP Server Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#f5f5f7;color:#333;overflow:hidden;height:100vh;}
:root{--tiktok-black:#010101;--tiktok-red:#FE2C55;--tiktok-cyan:#25F4EE;--sidebar-w:210px;--console-w:380px;}

/* LAYOUT */
.app-layout{display:flex;height:100vh;width:100vw;}
.sidebar{width:var(--sidebar-w);min-width:var(--sidebar-w);background:var(--tiktok-black);display:flex;flex-direction:column;z-index:10;box-shadow:2px 0 12px rgba(0,0,0,.3);}
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.top-bar{height:48px;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid #e0e0e0;display:flex;align-items:center;padding:0 24px;justify-content:space-between;flex-shrink:0;}
.top-bar .badge{background:linear-gradient(135deg,var(--tiktok-red),#ff6b81);color:#fff;font-size:11px;font-weight:700;padding:4px 12px;border-radius:20px;letter-spacing:.5px;position:relative;overflow:hidden;}
.top-bar .badge::after{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);animation:shimmer 3s infinite;}
@keyframes shimmer{0%{left:-100%;}100%{left:100%;}}
.top-bar .user-info{font-size:13px;color:#666;}
.content-wrap{display:flex;flex:1;overflow:hidden;}
.main-content{flex:1;overflow-y:auto;padding:28px 32px;scroll-behavior:smooth;}
@keyframes fadeInContent{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.main-content > *{animation:fadeInContent .3s ease;}
.api-console{width:var(--console-w);min-width:var(--console-w);background:#1a1a2e;display:flex;flex-direction:column;border-left:1px solid #2a2a4a;}

/* SIDEBAR */
.sidebar-logo{padding:20px 18px 10px;display:flex;align-items:center;gap:10px;}
.sidebar-logo svg{width:32px;height:32px;}
.sidebar-logo span{color:#fff;font-weight:700;font-size:15px;}
.sidebar-nav{flex:1;padding:10px 0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;color:#aaa;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border-left:3px solid transparent;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.06);color:#ddd;}
.nav-item.active{color:#fff;background:rgba(254,44,85,.12);border-left-color:var(--tiktok-red);}
.nav-item.active::after{content:'';position:absolute;right:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--tiktok-red);border-radius:3px 0 0 3px;box-shadow:0 0 8px rgba(254,44,85,.5);}
.nav-item .icon{width:18px;text-align:center;font-size:15px;}
.nav-item.disabled{opacity:.35;pointer-events:none;}
.sidebar-footer{padding:16px 18px;border-top:1px solid #222;}
.sidebar-footer .status{display:flex;align-items:center;gap:8px;font-size:11px;color:#888;}
.sidebar-footer .dot{width:8px;height:8px;border-radius:50%;background:#555;}
.sidebar-footer .dot.online{background:#00c853;animation:dotPulse 2s infinite;}
@keyframes dotPulse{0%,100%{box-shadow:0 0 0 0 rgba(0,200,83,.4);}50%{box-shadow:0 0 0 6px rgba(0,200,83,0);}}

/* API CONSOLE */
.console-header{padding:12px 16px;border-bottom:1px solid #2a2a4a;display:flex;align-items:center;justify-content:space-between;}
.console-header h3{color:#25F4EE;font-size:12px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.console-clear{background:none;border:1px solid #444;color:#aaa;font-size:11px;padding:3px 10px;border-radius:4px;cursor:pointer;font-family:'Inter';}
.console-clear:hover{border-color:#888;color:#ddd;}
.console-body{flex:1;overflow-y:auto;padding:10px 14px;font-family:'Consolas','Monaco','Courier New',monospace;font-size:11.5px;line-height:1.55;}
.console-entry{margin-bottom:14px;border-bottom:1px solid #2a2a3a;padding-bottom:12px;border-left:3px solid transparent;padding-left:10px;transition:border-color .2s;}
.console-entry:hover{border-left-color:var(--tiktok-cyan);background:rgba(37,244,238,.03);}
.console-entry .timestamp{color:#666;font-size:10px;}
.console-entry .method{font-weight:700;}
.console-entry .method.GET{color:#25F4EE;}
.console-entry .method.POST{color:#00c853;}
.console-entry .method.PUT{color:#ffab00;}
.console-entry .method.DELETE{color:#FE2C55;}
.console-entry .url{color:#ddd;}
.console-entry .section-label{color:#888;font-size:10px;margin-top:6px;display:block;}
.console-entry pre{color:#ccc;white-space:pre-wrap;word-break:break-all;font-size:11px;margin-top:2px;}
.console-entry .response-ok{color:#00c853;}
.console-entry .response-err{color:#FE2C55;}
.console-empty{color:#555;font-style:italic;text-align:center;margin-top:40px;font-size:12px;}

/* CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin:20px 0;}
.kpi-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.08);border-left:4px solid transparent;overflow:hidden;transition:all .25s;}
.kpi-card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.12);}
.kpi-card .label{font-size:12px;color:#888;font-weight:500;margin-bottom:6px;}
.kpi-card .value{font-size:26px;font-weight:700;color:var(--tiktok-black);}
.kpi-card .sub{font-size:12px;color:#aaa;margin-top:4px;}
.account-card{background:linear-gradient(135deg,#010101,#1a1a2e);color:#fff;border-radius:14px;padding:24px 28px;display:flex;align-items:center;gap:20px;box-shadow:0 4px 20px rgba(0,0,0,.3);}
.account-card .avatar{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--tiktok-red),var(--tiktok-cyan));display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;}
.account-card .info h2{font-size:18px;font-weight:700;}
.account-card .info p{font-size:12px;color:#aaa;margin-top:2px;}
.account-card .status-badge{margin-left:auto;background:rgba(0,200,83,.15);color:#00c853;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;}

/* BUTTONS */
.btn{padding:10px 22px;border:none;border-radius:8px;font-family:'Inter';font-weight:600;font-size:13px;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:8px;}
.btn-primary{background:var(--tiktok-red);color:#fff;}
.btn-primary:hover{background:#e0253f;transform:translateY(-1px);}
.btn-secondary{background:#f0f0f0;color:#333;}
.btn-secondary:hover{background:#e0e0e0;}
.btn-sm{padding:6px 14px;font-size:12px;border-radius:6px;}
.btn-outline{background:none;border:1px solid #ddd;color:#555;}
.btn-outline:hover{border-color:#999;color:#333;}
.btn-cyan{background:var(--tiktok-cyan);color:var(--tiktok-black);}
.btn-cyan:hover{background:#1de0db;}
.btn-dark{background:#222;color:#fff;}
.btn-dark:hover{background:#333;}
.btn-danger{background:#ff4444;color:#fff;}
.btn-danger:hover{background:#cc0000;}
.action-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:20px 0;}
.action-btn{background:#fff;border:1px solid #e8e8e8;border-radius:10px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;box-shadow:0 1px 6px rgba(0,0,0,.06);}
.action-btn:hover{border-color:var(--tiktok-red);box-shadow:0 2px 12px rgba(254,44,85,.1);transform:translateY(-2px);}
.action-btn .icon{font-size:24px;margin-bottom:8px;}
.action-btn .text{font-size:13px;font-weight:600;color:#333;}

/* TABLE */
.data-table{width:100%;border-collapse:collapse;margin:16px 0;background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08);}
.data-table th{background:#fafafa;padding:12px 16px;text-align:left;font-size:12px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #eee;}
.data-table td{padding:12px 16px;font-size:13px;border-bottom:1px solid #f5f5f5;}
.data-table tr:hover td{background:#f8faff;}
.data-table tr:hover td:first-child{box-shadow:inset 3px 0 0 var(--tiktok-red);}
.status-active{color:#00c853;font-weight:600;}
.status-paused{color:#ffab00;font-weight:600;}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.modal-overlay.show{opacity:1;pointer-events:auto;}
.modal{background:#fff;border-radius:16px;padding:32px;max-width:520px;width:90%;max-height:85vh;overflow-y:auto;transform:scale(.95);transition:transform .3s;}
.modal-overlay.show .modal{transform:scale(1);}
.modal h2{font-size:18px;font-weight:700;margin-bottom:16px;color:var(--tiktok-black);}
.modal-close{position:absolute;top:14px;right:18px;background:none;border:none;font-size:22px;cursor:pointer;color:#888;}

/* FORMS */
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:6px;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-family:'Inter';font-size:13px;transition:border-color .2s;}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--tiktok-red);}
.form-group textarea{min-height:80px;resize:vertical;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.checkbox-group{display:flex;flex-wrap:wrap;gap:10px;}
.checkbox-group label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;cursor:pointer;}

/* OAUTH PAGE */
.oauth-page{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100%;text-align:center;padding:40px;}
.oauth-page h1{font-size:28px;font-weight:800;margin-bottom:8px;}
.oauth-page h1 span.red{color:var(--tiktok-red);}
.oauth-page h1 span.cyan{color:var(--tiktok-cyan);}
.oauth-page .subtitle{font-size:14px;color:#777;max-width:560px;line-height:1.6;margin-bottom:32px;}
.connect-btn{background:linear-gradient(135deg,#010101 0%,#1a1a2e 100%);color:#fff;padding:16px 36px;border:none;border-radius:12px;font-family:'Inter';font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .25s;box-shadow:0 4px 20px rgba(0,0,0,.3);animation:pulse 2s infinite;}
.connect-btn:hover{background:#222;transform:translateY(-2px);box-shadow:0 8px 30px rgba(254,44,85,.3);}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(254,44,85,.4);}70%{box-shadow:0 0 0 15px rgba(254,44,85,0);}}
.connect-btn svg{width:28px;height:28px;}
.success-state{text-align:center;}
.success-state .check{width:72px;height:72px;background:#e8f5e9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:36px;color:#00c853;animation:scaleIn .5s cubic-bezier(.175,.885,.32,1.275);}
.success-state h2{font-size:22px;font-weight:700;color:#00c853;margin-bottom:16px;animation:fadeUp .5s ease .2s both;}
.success-state .detail{font-size:13px;color:#666;margin:6px 0;animation:fadeUp .4s ease calc(.3s + var(--i,0) * .1s) both;}
@keyframes scaleIn{from{transform:scale(0);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
.success-state .detail strong{color:#333;}

/* LOADING */
.loader{display:inline-block;width:40px;height:40px;border:4px solid #e0e0e0;border-top-color:var(--tiktok-red);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{margin-top:14px;color:#888;font-size:14px;}

/* TIKTOK OAUTH MODAL */
.tiktok-oauth-modal{background:#fff;border-radius:16px;padding:0;max-width:440px;width:90%;overflow:hidden;}
.tiktok-oauth-header{background:var(--tiktok-black);padding:24px;text-align:center;}
.tiktok-oauth-header svg{width:40px;height:40px;}
.tiktok-oauth-header h3{color:#fff;font-size:16px;margin-top:10px;}
.tiktok-oauth-body{padding:28px;}
.tiktok-oauth-body .app-info{text-align:center;margin-bottom:20px;}
.tiktok-oauth-body .app-info .app-name{font-size:16px;font-weight:700;color:var(--tiktok-red);}
.tiktok-oauth-body .app-info p{font-size:13px;color:#666;margin-top:6px;}
.perm-list{list-style:none;margin:16px 0 24px;}
.perm-list li{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f0f0f0;font-size:13px;color:#444;}
.perm-list li .perm-icon{color:#00c853;font-size:16px;}
.oauth-actions{display:flex;gap:10px;}
.oauth-actions .btn{flex:1;justify-content:center;padding:12px;}

/* CHART CONTAINER */
.chart-container{background:#fff;border-radius:12px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08);margin:16px 0;}
.chart-container canvas{max-height:340px;}

/* HASH VIS */
.hash-vis{background:#f7f7f7;border-radius:8px;padding:14px;margin:10px 0;font-family:monospace;font-size:12px;}
.hash-row{display:flex;align-items:center;gap:8px;margin:4px 0;flex-wrap:wrap;}
.hash-row .email{color:var(--tiktok-red);}
.hash-row .arrow{color:#aaa;}
.hash-row .hash{color:#00c853;word-break:break-all;}

/* SECTION */
.section-title{font-size:20px;font-weight:700;color:var(--tiktok-black);margin-bottom:4px;}
.section-sub{font-size:13px;color:#888;margin-bottom:20px;}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;}

/* AD CREATION SPLIT */
.ad-split{display:grid;grid-template-columns:1fr 1fr;gap:24px;}
.ad-panel{background:#fff;border-radius:12px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,.06);}
.ad-panel h3{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f0f0f0;}

/* DATE INPUTS */
.date-row{display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;}
.date-row input[type=date]{padding:8px 12px;border:1px solid #ddd;border-radius:8px;font-family:'Inter';font-size:13px;}
.date-row label{font-size:13px;font-weight:500;color:#555;}

/* UPLOAD MOCK */
.upload-area{border:2px dashed #ddd;border-radius:10px;padding:30px;text-align:center;color:#aaa;cursor:pointer;transition:border-color .2s;}
.upload-area:hover{border-color:var(--tiktok-red);}
.upload-area .icon{font-size:32px;margin-bottom:8px;}
.upload-area p{font-size:13px;}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px;}
.api-console ::-webkit-scrollbar-thumb{background:#444;}
.api-console ::-webkit-scrollbar-track{background:#1a1a2e;}

/* CONFIRM DIALOG */
.confirm-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;}
.confirm-overlay.show{opacity:1;pointer-events:auto;}
.confirm-box{background:#fff;border-radius:12px;padding:28px;max-width:380px;width:90%;text-align:center;}
.confirm-box h3{font-size:16px;font-weight:700;margin-bottom:10px;}
.confirm-box p{font-size:13px;color:#666;margin-bottom:20px;}
.confirm-box .actions{display:flex;gap:10px;justify-content:center;}
</style>
</head>

  <div class="main-area">

        <span class="badge">MCP Server Demo</span>

// UTILITY
function ts(){const d=new Date();return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;}
function maskToken(t){return '****'+t.slice(-8)+'****';}
function formatPEN(v){return v===0?'-':'S/'+v.toLocaleString('es-PE',{minimumFractionDigits:2,maximumFractionDigits:2});}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// CONSOLE
function addConsoleEntry(method, url, headers, requestBody, responseCode, responseBody, isError){
  const body = document.getElementById('consoleBody');
  body.querySelector('.console-empty')?.remove();
  const entry = document.createElement('div');
  entry.className = 'console-entry';
  let html = `<span class="timestamp">[${ts()}]</span> <span class="method ${method}">▶ ${method}</span> <span class="url">${escHtml(url)}</span>`;
  if(headers){
    html += `<span class="section-label">Headers:</span><pre>${escHtml(headers)}</pre>`;
  }
  if(requestBody){
    html += `<span class="section-label">Request:</span><pre>${escHtml(typeof requestBody==='string'?requestBody:JSON.stringify(requestBody,null,2))}</pre>`;
  }
  if(responseBody){
    const rc = isError?'response-err':'response-ok';
    html += `<span class="section-label ${rc}">Response (${responseCode}):</span><pre>${escHtml(typeof responseBody==='string'?responseBody:JSON.stringify(responseBody,null,2))}</pre>`;
  }
  entry.innerHTML = html;
  body.appendChild(entry);
  body.scrollTop = body.scrollHeight;
}

function clearConsole(){
  document.getElementById('consoleBody').innerHTML = '<div class="console-empty">Consola limpia</div>';
}

function stdHeaders(){
  return `  Access-Token: ${maskToken(ACCESS_TOKEN)}\n  Content-Type: application/json`;
}

function createCampaign(){
  const name = document.getElementById('newCampName').value;
  const obj = document.getElementById('newCampObj').value;
  const bm = document.getElementById('newCampBudgetMode').value;
  const budget = parseFloat(document.getElementById('newCampBudget').value)||100;
  const newId = '19'+String(campaigns.length+1).padStart(2,'0');
  campaigns.push({id:newId,name:name,status:'ACTIVE',spend:0,conv:0,cpc:0,budget:budget,budgetMode:bm,objective:obj});
  closeModal();

  addConsoleEntry('POST','/open_api/v1.3/campaign/create/',stdHeaders(),
    {advertiser_id:ADVERTISER_ID,campaign_name:name,objective_type:obj,budget:budget,budget_mode:bm,operation_status:'ENABLE'},
    '200 OK',
    {code:0,message:'OK',data:{campaign_id:newId}},
    false
  );

  renderCampaigns();
}

function editCampaign(idx){
  const c = campaigns[idx];
  openModal(`
    <h2>Editar Campaña</h2>
    <p style="font-size:13px;color:#888;margin-bottom:16px;">${escHtml(c.name)}</p>
    <div class="form-group"><label>Nuevo Presupuesto (PEN)</label><input type="number" id="editBudget" value="${c.budget}"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="saveEditCampaign(${idx})">Guardar Cambios</button>
    </div>
  `);
}

function saveEditCampaign(idx){
  const newBudget = parseFloat(document.getElementById('editBudget').value)||campaigns[idx].budget;
  const oldBudget = campaigns[idx].budget;
  campaigns[idx].budget = newBudget;
  closeModal();

  addConsoleEntry('PUT','/open_api/v1.3/campaign/update/',stdHeaders(),
    {advertiser_id:ADVERTISER_ID,campaign_id:campaigns[idx].id,budget:newBudget},
    '200 OK',
    {code:0,message:'OK',data:{campaign_id:campaigns[idx].id,budget:newBudget,previous_budget:oldBudget}},
    false
  );

  renderCampaigns();
}

function toggleCampaignStatus(idx){
  const c = campaigns[idx];
  const newStatus = c.status==='ACTIVE'?'PAUSED':'ACTIVE';
  const apiStatus = newStatus==='ACTIVE'?'ENABLE':'DISABLE';
  c.status = newStatus;

  addConsoleEntry('POST','/open_api/v1.3/campaign/update/status/',stdHeaders(),
    {advertiser_id:ADVERTISER_ID,campaign_ids:[c.id],operation_status:apiStatus},
    '200 OK',
    {code:0,message:'OK',data:{campaign_ids:[c.id],operation_status:apiStatus}},
    false
  );

  renderCampaigns();
}

function sha256Mock(email){
  let hash='';const chars='0123456789abcdef';
  let seed=0;for(let i=0;i<email.length;i++)seed+=email.charCodeAt(i);
  for(let i=0;i<64;i++){hash+=chars[(seed*7+i*13+i*i)%16];}
  return hash;
}

function createAudience(){
  const name=document.getElementById('audName').value;
  const desc=document.getElementById('audDesc').value;
  const emails=document.getElementById('audEmails').value.trim().split('\n').filter(e=>e.trim());
  const hashes=emails.map(e=>sha256Mock(e.trim()));
  const newId='aud'+String(audiences.length+1).padStart(3,'0');
  audiences.push({id:newId,name:name,type:'CUSTOMER_FILE',size:emails.length,status:'Activa'});
  closeModal();

  addConsoleEntry('POST','/open_api/v1.3/dmp/custom_audience/create/',stdHeaders(),
    {advertiser_id:ADVERTISER_ID,custom_audience_name:name,audience_type:'CUSTOMER_FILE',file_paths:[],calculate_type:'EVERY_TIME',audience_sub_type:'NORMAL',identity_type:'EMAIL_SHA256',identity_authorized:true,description:desc},
    '200 OK',
    {code:0,message:'OK',data:{custom_audience_id:newId}},
    false
  );

  addConsoleEntry('POST','/open_api/v1.3/dmp/custom_audience/update/',stdHeaders(),
    {advertiser_id:ADVERTISER_ID,custom_audience_id:newId,action:'APPEND',id_type:'EMAIL_SHA256',id_list:hashes},
    '200 OK',
    {code:0,message:'OK',data:{custom_audience_id:newId,users_added:emails.length}},
    false
  );

  renderAudiences();
}
